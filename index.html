<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bareke · Login</title>
    <!-- Solo una carga de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f8efde 0%, #f0e0c8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: #fffaf2;
            border-radius: 60px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
        }
        .login-card h2 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #b97f44, #5a2e12);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .brand-sub {
            font-size: 0.9rem;
            color: #b97f44;
            margin-bottom: 25px;
        }
        .input-group {
            position: relative;
            margin: 8px 0;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            padding-right: 45px;
            border: 2px solid #efd6b5;
            border-radius: 50px;
            background: white;
            font-size: 1rem;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #b97f44;
        }
        .login-btn {
            background: #c27e3a;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .shift-selector {
            margin: 15px 0;
            display: flex;
            gap: 12px;
        }
        .shift-btn {
            flex: 1;
            padding: 12px;
            background: #f4e5d4;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .shift-btn.selected {
            background: #c27e3a;
            color: white;
        }
        #loginError {
            color: #b34e3a;
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>BAREKE</h2>
    <div class="brand-sub">☕ bakery & coffee 🥐</div>
    
    <div class="input-group">
        <input type="text" id="loginUsername" placeholder="Usuario" autocomplete="off">
    </div>
    <div class="input-group">
        <input type="password" id="loginPassword" placeholder="Contraseña">
        <button class="toggle-password" data-target="loginPassword">👁️</button>
    </div>
    
    <div id="shiftSelectorDiv" style="display: none;">
        <p style="margin: 8px 0;">Selecciona tu turno de hoy:</p>
        <div class="shift-selector">
            <button id="shiftMorningBtn" class="shift-btn">🌅 MAÑANA</button>
            <button id="shiftAfternoonBtn" class="shift-btn">🌆 TARDE</button>
        </div>
    </div>
    
    <button class="login-btn" id="loginBtn">INGRESAR</button>
    <div id="loginError"></div>
</div>

<script>
    (function() {
        // Esperamos a que el DOM cargue completamente
        document.addEventListener("DOMContentLoaded", function() {
            // Configuración de Supabase (única vez)
            const SUPABASE_URL = "https://xgnwcurixdsntafchbmn.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbndjdXJpeGRzbnRhZmNoYm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDY3ODUsImV4cCI6MjA5NDA4Mjc4NX0.sW-fYAUPMVUDL_ztX8Wu6JtChha5-sUCHIUwKFWGnAY";
            // Verificar si ya existe la variable global para evitar duplicados
            if (typeof window._supabaseClient === 'undefined') {
                window._supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            const supabase = window._supabaseClient;

            // Elementos del DOM
            const usernameInput = document.getElementById("loginUsername");
            const passwordInput = document.getElementById("loginPassword");
            const loginBtn = document.getElementById("loginBtn");
            const errorDiv = document.getElementById("loginError");
            const shiftDiv = document.getElementById("shiftSelectorDiv");
            const morningBtn = document.getElementById("shiftMorningBtn");
            const afternoonBtn = document.getElementById("shiftAfternoonBtn");

            // Variables de turno
            let selectedShift = null;

            // Función para actualizar estilos de los botones de turno
            function updateShiftButtons() {
                morningBtn.classList.toggle("selected", selectedShift === "manana");
                afternoonBtn.classList.toggle("selected", selectedShift === "tarde");
            }

            // Eventos para los botones de turno
            if (morningBtn) {
                morningBtn.onclick = function() {
                    selectedShift = "manana";
                    updateShiftButtons();
                };
            }
            if (afternoonBtn) {
                afternoonBtn.onclick = function() {
                    selectedShift = "tarde";
                    updateShiftButtons();
                };
            }

            // Evento para mostrar/ocultar selector según usuario
            if (usernameInput) {
                usernameInput.addEventListener("input", function() {
                    const isAdmin = this.value.trim().toLowerCase() === "admin";
                    shiftDiv.style.display = isAdmin ? "none" : "block";
                    // Si se cambia a admin, reseteamos el turno seleccionado
                    if (isAdmin) {
                        selectedShift = null;
                        updateShiftButtons();
                    }
                });
            }

            // Botones de mostrar/ocultar contraseña
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    if (input) {
                        input.type = input.type === "password" ? "text" : "password";
                    }
                });
            });

            // Evento de login
            if (loginBtn) {
                loginBtn.onclick = async function() {
                    const username = usernameInput.value.trim().toLowerCase();
                    const password = passwordInput.value;
                    errorDiv.innerText = "";

                    if (!username || !password) {
                        errorDiv.innerText = "❌ Ingresa usuario y contraseña";
                        return;
                    }

                    try {
                        const { data, error } = await supabase
                            .from('usuarios')
                            .select('*')
                            .eq('id', username);

                        if (error) {
                            console.error("Error Supabase:", error);
                            errorDiv.innerText = "❌ Error de conexión con la base de datos";
                            return;
                        }

                        if (!data || data.length === 0) {
                            errorDiv.innerText = "❌ Usuario o contraseña incorrectos";
                            return;
                        }

                        const user = data[0];
                        if (user.password !== password) {
                            errorDiv.innerText = "❌ Usuario o contraseña incorrectos";
                            return;
                        }

                        if (user.tipo === "admin") {
                            alert("Bienvenido Administrador. Aquí cargará el dashboard completo.");
                            // Aquí rediriges al panel principal
                        } else {
                            if (!selectedShift) {
                                errorDiv.innerText = "❌ Debes seleccionar un turno (Mañana o Tarde)";
                                return;
                            }
                            alert(`Bienvenido ${user.nombre}. Turno: ${selectedShift === "manana" ? "Mañana" : "Tarde"}. Aquí cargará el dashboard.`);
                            // Aquí rediriges al panel principal
                        }
                    } catch (err) {
                        console.error("Error inesperado:", err);
                        errorDiv.innerText = "❌ Error inesperado. Revisa la consola.";
                    }
                };
            }
        });
    })();
</script>
</body>
</html>
